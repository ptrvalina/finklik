# Мониторинг: Prometheus + Grafana.
# Запуск вместе с dev-стеком (сеть уже создана compose.dev):
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.monitoring.yml up -d
#
# UI: Prometheus http://localhost:9090  Grafana http://localhost:3001 (admin / admin_change_me)

name: finklik-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: finklik-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - finklik-dev-network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: finklik-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_change_me
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - finklik-dev-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  finklik-dev-network:
    external: true
    name: finklik-dev-network
