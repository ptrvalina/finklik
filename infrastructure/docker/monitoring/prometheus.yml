# Скрапинг API ФинКлик (docker compose: сервис backend в сети finklik-dev-network)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: finklik-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
        labels:
          service: api-gateway

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
