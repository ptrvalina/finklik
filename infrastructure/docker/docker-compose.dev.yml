name: finklik-dev

services:

  # ── Базы данных ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finklik-postgres
    environment:
      POSTGRES_DB: finklik
      POSTGRES_USER: finklik
      POSTGRES_PASSWORD: finklik_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finklik"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: finklik-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: finklik-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://finklik:finklik_dev@postgres:5432/finklik
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev_secret_key_finklik_2024_min32chars
      JWT_REFRESH_SECRET_KEY: dev_refresh_key_finklik_2024_min32
      MOCK_BANK_URL: http://mock-bank:8001
      ONEC_MOCK_URL: http://mock-onec:8002
      DEBUG: "true"
    volumes:
      - ../../backend/api-gateway/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── Mock сервисы ───────────────────────────────────────────────────────
  mock-bank:
    build:
      context: ../../backend/mock-bank
      dockerfile: Dockerfile.mock
    container_name: finklik-mock-bank
    ports:
      - "8001:8001"

  mock-onec:
    build:
      context: ../../onec-mock
      dockerfile: Dockerfile.mock
    container_name: finklik-mock-onec
    ports:
      - "8002:8002"

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: finklik-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend/web:/app
    environment:
      VITE_API_URL: https://desperate-source-convenient-sql.trycloudflare.com

volumes:
  postgres_data:

networks:
  default:
    name: finklik-dev-network
