# FinKlik API на Render: New → Blueprint → выбрать этот репозиторий.
# После деплоя скопируйте URL вида https://finklik-api.onrender.com в VITE_API_URL (Vercel).
# Web — free (засыпает без трафика); Postgres — платный план basic-256mb (см. цены на render.com).

databases:
  - name: finklik-postgres
    databaseName: finklik
    plan: basic-256mb

services:
  - type: web
    name: finklik-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/api-gateway/Dockerfile
    dockerContext: ./backend/api-gateway
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finklik-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      # Опционально: массовое обновление 1С (POST /api/v1/onec/admin/bulk-connections)
      - key: PROVISION_ADMIN_TOKEN
        generateValue: true
      # Webhook оркестратора ИБ (POST /api/v1/onec/webhooks/provision)
      - key: PROVISION_WEBHOOK_SECRET
        generateValue: true
