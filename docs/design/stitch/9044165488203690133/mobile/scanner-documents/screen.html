<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-viewport {
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
        }
        .scan-overlay {
            position: absolute;
            inset: 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            pointer-events: none;
        }
        .corner-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 4px solid white;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #84f9c3, transparent);
            box-shadow: 0 0 15px #84f9c3;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .glass-blur {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
        }
    </style>

<script>
        // Simple Interaction Scripts
        const flashBtn = document.getElementById('flashToggle');
        let flashOn = false;

        flashBtn.addEventListener('click', () => {
            flashOn = !flashOn;
            const icon = flashBtn.querySelector('span');
            if (flashOn) {
                icon.textContent = 'flash_on';
                flashBtn.classList.remove('bg-surface-container-high');
                flashBtn.classList.add('bg-tertiary-fixed', 'text-on-tertiary-fixed');
            } else {
                icon.textContent = 'flash_off';
                flashBtn.classList.add('bg-surface-container-high');
                flashBtn.classList.remove('bg-tertiary-fixed', 'text-on-tertiary-fixed');
            }
        });

        // Simulating some focus logic on the viewfinder
        const viewport = document.querySelector('.scanner-viewport');
        viewport.addEventListener('click', (e) => {
            const circle = document.createElement('div');
            circle.style.position = 'absolute';
            circle.style.width = '60px';
            circle.style.height = '60px';
            circle.style.border = '2px solid #84f9c3';
            circle.style.borderRadius = '50%';
            circle.style.left = `${e.offsetX - 30}px`;
            circle.style.top = `${e.offsetY - 30}px`;
            circle.style.pointerEvents = 'none';
            circle.style.transition = 'all 0.4s ease-out';
            circle.style.transform = 'scale(1.5)';
            circle.style.opacity = '1';
            
            viewport.appendChild(circle);

            requestAnimationFrame(() => {
                circle.style.transform = 'scale(1)';
                circle.style.opacity = '0';
            });

            setTimeout(() => circle.remove(), 400);
        });
    </script>
