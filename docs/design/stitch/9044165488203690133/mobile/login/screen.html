<style>

<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">
<!-- Top AppBar (Simplified for Auth) -->
<header class="w-full top-0 sticky z-50 bg-background/80 backdrop-blur-md">
<div class="flex justify-between items-center px-margin-mobile md:px-margin-desktop w-full max-w-6xl mx-auto h-14">
<div class="font-headline-md text-headline-md font-bold text-primary">FinKlik</div>
<button class="material-symbols-outlined text-secondary hover:opacity-80 transition-opacity" data-icon="close">close</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-section-md relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-tertiary-fixed/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="w-full max-w-md z-10">
<!-- Login Card -->
<div class="glass-panel p-8 md:p-10 rounded-[24px] space-y-8">
<div class="text-center md:text-left">
<h1 class="font-display-lg text-display-lg text-on-surface mb-2">С возвращением!</h1>
<p class="font-body-base text-body-base text-secondary">Пожалуйста, войдите в свой аккаунт</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-secondary uppercase block ml-1">Email</label>
<div class="relative flex items-center input-focus-ring border border-outline-variant bg-surface-container-low rounded-xl transition-all h-11">
<span class="material-symbols-outlined absolute left-3 text-secondary" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 pl-10 pr-4 font-body-base text-on-surface placeholder:text-outline-variant" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-secondary uppercase block">Пароль</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Забыли?</a>
</div>
<div class="relative flex items-center input-focus-ring border border-outline-variant bg-surface-container-low rounded-xl transition-all h-11">
<span class="material-symbols-outlined absolute left-3 text-secondary" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 pl-10 pr-12 font-body-base text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined absolute right-3 text-secondary hover:text-primary transition-colors" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Action Buttons Row -->
<div class="flex gap-3 pt-2">
<button class="flex-grow login-btn-gradient text-white font-headline-sm text-headline-sm py-3 rounded-full shadow-lg shadow-primary/20 flex justify-center items-center gap-2 group">
                            Войти
                            <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-[52px] h-[52px] flex items-center justify-center border border-outline-variant rounded-full text-primary hover:bg-primary-fixed transition-all active:scale-90" title="Biometric Login">
<span class="material-symbols-outlined text-[32px]" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</form>
<div class="relative py-4 flex items-center">

<span class="material-symbols-outlined text-[22px]" data-icon="apple" data-weight="fill">apps</span>

</p>

</div>

<footer class="w-full py-6 px-margin-mobile">

<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors uppercase" href="#">Безопасность</a>

<div class="font-label-caps text-label-caps text-outline uppercase tracking-widest">
                © 2024 Finklik Global Solutions
            </div>

<script>
        // Micro-interactions and focus states
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });

        // Visibility toggle
        const toggleBtn = document.querySelector('[data-icon="visibility"]');
        const passInput = document.querySelector('input[type="password"]');
        if (toggleBtn && passInput) {
            toggleBtn.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.textContent = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
