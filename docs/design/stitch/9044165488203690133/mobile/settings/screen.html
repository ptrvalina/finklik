<script>
        // Toggle logic for visual interaction
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', function() {
                const dot = this.nextElementSibling.querySelector('.toggle-dot');
                if (this.checked) {
                    dot.style.transform = 'translateX(1.25rem)';
                    this.nextElementSibling.style.backgroundColor = '#004191';
                } else {
                    dot.style.transform = 'translateX(0)';
                    this.nextElementSibling.style.backgroundColor = '#c2c6d5';
                }
            });
            
            // Set initial state
            if (toggle.checked) {
                const dot = toggle.nextElementSibling.querySelector('.toggle-dot');
                dot.style.transform = 'translateX(1.25rem)';
                toggle.nextElementSibling.style.backgroundColor = '#004191';
            }
        });
    </script>
