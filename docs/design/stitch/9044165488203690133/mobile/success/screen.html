<style>

<body class="bg-background text-on-background font-body-base min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden">
<!-- Atmospheric Background Effects -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] success-bg-aura rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[30vw] h-[30vw] bg-primary/5 rounded-full blur-[80px]"></div>
</div>
<!-- Main Success Canvas -->
<main class="relative z-10 w-full max-w-lg">
<div class="glass-card rounded-[24px] p-8 md:p-12 flex flex-col items-center text-center shadow-2xl emerald-glow animate-in fade-in zoom-in duration-700">
<!-- Success Icon Animation Container -->
<div class="relative w-24 h-24 mb-8">
<!-- Outer Pulse Rings -->
<div class="absolute inset-0 bg-tertiary-fixed/30 rounded-full animate-ping opacity-20"></div>
<div class="absolute inset-2 bg-tertiary-fixed/50 rounded-full animate-pulse opacity-40"></div>
<!-- Main Circle -->
<div class="absolute inset-0 bg-tertiary text-on-tertiary-container rounded-full flex items-center justify-center shadow-lg">
<svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24">
<path class="checkmark-draw" d="M20 6L9 17L4 12"></path>
</svg>
</div>
</div>
<!-- Content -->
<div class="space-y-4 mb-10">
<h1 class="font-display-lg text-display-lg text-on-surface tracking-tight">
                    Successfully Sent
                </h1>
<p class="text-on-surface-variant font-body-base max-w-xs mx-auto">
                    Your quarterly report to FSZN has been processed and successfully validated. A copy has been sent to your registered email.
                </p>
</div>
<!-- Summary Card (Bento Style) -->
<div class="w-full bg-surface-container-low rounded-xl p-6 mb-10 text-left border border-outline-variant/30 space-y-4">
<div class="flex justify-between items-center border-b border-outline-variant/20 pb-3">
<span class="font-label-caps text-label-caps text-on-surface-variant">Transaction ID</span>
<span class="font-mono-data text-mono-data text-primary">#FIN-9920-XQ</span>
</div>
<div class="flex justify-between items-center border-b border-outline-variant/20 pb-3">
<span class="font-label-caps text-label-caps text-on-surface-variant">Recipient</span>
<span class="font-body-base font-semibold text-on-surface">FSZN Department</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">Status</span>

</div>

<script>
        function handleDashboardRedirect() {
            // Animation before navigation
            const card = document.querySelector('.glass-card');
            card.style.transform = 'scale(0.98)';
            card.style.opacity = '0';
            card.style.transition = 'all 0.4s ease-in-out';
            
            setTimeout(() => {
                console.log("Navigating to dashboard...");
            }, 400);
        }

        // Lightweight atmospheric confetti micro-interaction
        function spawnConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#84f9c3', '#0058be', '#adc6ff'];
            
            for(let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'absolute';
                confetti.style.width = Math.random() * 8 + 4 + 'px';
                confetti.style.height = Math.random() * 8 + 4 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.top = '50%';
                confetti.style.left = '50%';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.opacity = '0';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 200 + 100;
                const x = Math.cos(angle) * velocity;
                const y = Math.sin(angle) * velocity;
                
                container.appendChild(confetti);
                
                confetti.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 1000,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    delay: Math.random() * 200
                }).onfinish = () => confetti.remove();
            }
        }

        // Trigger confetti on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(spawnConfetti, 600);
        });
    </script>
