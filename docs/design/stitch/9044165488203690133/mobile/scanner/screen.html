<script>
        // Simple Interaction Logic
        document.querySelector('.shutter-press').addEventListener('click', function() {
            const scanLine = document.querySelector('.scan-line');
            scanLine.style.animation = 'none';
            void scanLine.offsetWidth; // Trigger reflow
            scanLine.style.animation = 'scan 0.5s ease-in-out';
            
            // Add haptic feedback simulation
            this.style.backgroundColor = '#e1e2e5';
            setTimeout(() => {
                this.style.backgroundColor = 'white';
            }, 100);
        });

        // Toggle Dark Mode (Optional Micro-interaction)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (e.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });
    </script>
