<script>
        // OTP Logic
        const inputs = document.querySelectorAll('.otp-input');
        const form = document.getElementById('otp-form');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, inputs.length);
                pasteData.split('').forEach((char, i) => {
                    if (inputs[i]) inputs[i].value = char;
                });
                if (inputs[pasteData.length]) inputs[pasteData.length].focus();
            });
        });

        // Timer Logic
        let timeLeft = 120; // 2 minutes
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const updateTimer = () => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft === 0) {
                clearInterval(timerInterval);
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-outline', 'cursor-not-allowed');
                resendBtn.classList.add('text-primary', 'cursor-pointer');
                document.getElementById('timer-container').classList.add('opacity-40');
            } else {
                timeLeft--;
            }
        };

        const timerInterval = setInterval(updateTimer, 1000);

        // Form Submit Simulation
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <div class="w-6 h-6 border-2 border-on-primary/30 border-t-on-primary rounded-full animate-spin"></div>
                <span>Проверка...</span>
            `;

            // Mock verification delay
            setTimeout(() => {
                submitBtn.classList.remove('primary-gradient');
                submitBtn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Успешно</span>
                `;
                
                // Trigger success visual feedback on inputs
                inputs.forEach(input => {
                    input.classList.remove('border-outline-variant/40');
                    input.classList.add('border-tertiary-fixed-dim', 'bg-tertiary/5');
                });
            }, 1500);
        });

        // Resend Simulation
        resendBtn.addEventListener('click', () => {
            if (resendBtn.disabled) return;
            
            // Reset timer
            timeLeft = 120;
            resendBtn.disabled = true;
            resendBtn.classList.add('text-outline', 'cursor-not-allowed');
            resendBtn.classList.remove('text-primary', 'cursor-pointer');
            document.getElementById('timer-container').classList.remove('opacity-40');
            
            // Notification mock
            console.log("New code sent...");
        });
    </script>
