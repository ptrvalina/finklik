[pytest]
markers =
    network: тест обращается к внешнему HTTPS (например api.nbrb.by)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# pytest-asyncio 1.3: иначе тесты в function-loop, а session async-фикстуры — в session-loop → падение.
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
