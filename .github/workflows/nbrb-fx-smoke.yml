name: NBRB FX Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  nbrb-fx-smoke:
    name: NBRB FX Live Smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DISABLE_RATE_LIMIT: "1"
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8,<9" "pytest-asyncio>=1.3.0" httpx aiosqlite

      - name: Live smoke — курсы НБ РБ (HTTPS → www.nbrb.by)
        run: python -m pytest tests/integration/test_fx_nbrb_live.py -v --tb=short -m network
