# Статический «прод» фронта на GitHub Pages.
# Настройки репозитория: Settings → Pages → Build and deployment → Source: GitHub Actions.
# URL: https://<owner>.github.io/<repo>/
#
# VITE_API_URL: задайте в Settings → Actions → Variables, если API не https://finklik-api.onrender.com
# Не указывайте URL GitHub Pages (https://<user>.github.io/<repo>/): POST к API даст 405.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install and build
        working-directory: frontend/web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          API_URL="${{ vars.VITE_API_URL }}"
          if [ -z "$API_URL" ]; then API_URL="https://finklik-api.onrender.com"; fi
          export VITE_API_URL="$API_URL"
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
