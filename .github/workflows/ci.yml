name: CI

# Все push в main/develop + любой pull_request (в любую ветку)
on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  buyer-demo-smoke:
    name: Buyer Demo Smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DISABLE_RATE_LIMIT: "1"
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8,<9" "pytest-asyncio>=1.3.0" httpx aiosqlite

      - name: Run buyer smoke tests
        run: python -m pytest tests/integration/test_buyer_smoke.py -v --tb=short

  payment-critical-smoke:
    name: Payment Critical Smoke
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DISABLE_RATE_LIMIT: "1"
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8,<9" "pytest-asyncio>=1.3.0" httpx aiosqlite

      - name: Run critical payment flow tests
        run: |
          python -m pytest \
            tests/integration/test_buyer_smoke.py::test_buyer_demo_invoice_payment_smoke \
            -v --tb=short

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      DISABLE_RATE_LIMIT: "1"
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/api-gateway/requirements.txt

      # Локальный аналог: `make verify-like-ci` из корня репо (те же шаги, см. Makefile).

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # С pytest.ini (asyncio_default_test_loop_scope) нужен pytest-asyncio >= 1.3
          pip install "pytest>=8,<9" "pytest-asyncio>=1.3.0" httpx aiosqlite

      - name: Python and Alembic heads
        run: |
          python --version
          python -m alembic heads
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Backend unit tests
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Backend integration (metrics, submissions, scanner)
        run: |
          python -m pytest \
            tests/integration/test_metrics.py \
            tests/integration/test_submissions.py \
            tests/integration/test_scanner.py \
            -v --tb=short

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "flake8>=7,<8"

      - name: Lint Python
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__,venv --count --show-source --statistics

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: "http://localhost:8000"

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - buyer-demo-smoke
      - payment-critical-smoke
      - backend-tests
      - backend-lint
      - frontend-build
    if: always()

    steps:
      - name: Generate summary markdown
        shell: bash
        run: |
          cat <<'EOF' > release-summary.md
          # CI Release Summary

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Jobs

          - Buyer Demo Smoke: `${{ needs.buyer-demo-smoke.result }}`
          - Payment Critical Smoke: `${{ needs.payment-critical-smoke.result }}`
          - Backend Tests: `${{ needs.backend-tests.result }}`
          - Backend Lint: `${{ needs.backend-lint.result }}`
          - Frontend Build: `${{ needs.frontend-build.result }}`

          ## Readiness Gate

          Gate is **PASS** only if all jobs above are `success`.
          EOF

      - name: Upload release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: release-summary.md
