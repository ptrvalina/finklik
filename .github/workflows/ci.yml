name: CI

# Все push в main/develop + любой pull_request (в любую ветку)
on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "pytest>=8,<9" "pytest-asyncio>=0.24" httpx aiosqlite

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "flake8>=7,<8"

      - name: Lint Python
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__,venv --count --show-source --statistics

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: "http://localhost:8000"
